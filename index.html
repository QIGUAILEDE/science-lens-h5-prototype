<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>科研镜头 H5 原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Science Lens Prototype</p>
          <h1>科研镜头</h1>
        </div>
        <label class="upload-button">
          <input id="fileInput" type="file" accept="image/*" />
          上传图片
        </label>
      </header>

      <section class="stage-card">
        <canvas id="previewCanvas" width="1200" height="1200" aria-label="科研镜头预览"></canvas>
        <div id="emptyState" class="empty-state">
          <strong>先上传一张照片</strong>
          <span>推荐用食物、植物、桌面小物、实验室日常图，效果更像“小红书科研梗图”。</span>
        </div>
      </section>

      <section class="controls">
        <div>
          <h2>镜头</h2>
          <div id="lensList" class="lens-list"></div>
        </div>

        <div class="control-grid">
          <label>
            缩放
            <input id="zoomRange" type="range" min="0.5" max="3" value="1" step="0.01" />
          </label>
          <label>
            X 位移
            <input id="offsetXRange" type="range" min="-500" max="500" value="0" step="1" />
          </label>
          <label>
            Y 位移
            <input id="offsetYRange" type="range" min="-500" max="500" value="0" step="1" />
          </label>
          <label>
            旋转
            <input id="rotationRange" type="range" min="-180" max="180" value="0" step="1" />
          </label>
        </div>

        <div class="actions">
          <button id="resetButton" type="button">重置图片</button>
          <button id="downloadButton" type="button">下载预览图</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
