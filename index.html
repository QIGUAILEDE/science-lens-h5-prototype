<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>科研镜头 H5 原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Science Lens Advanced Prototype</p>
          <h1>科研镜头实验台</h1>
        </div>
        <div class="top-actions">
          <button id="compareButton" type="button" aria-pressed="false">原图</button>
          <label class="upload-button">
            <input id="fileInput" type="file" accept="image/*" multiple />
            上传图片
          </label>
        </div>
      </header>

      <section class="stage-card">
        <canvas id="previewCanvas" width="1200" height="1200" aria-label="科研镜头预览"></canvas>
        <div id="emptyState" class="empty-state">
          <strong>先上传一张照片</strong>
          <span>推荐用食物、植物、桌面小物、实验室日常图，效果更像“小红书科研梗图”。</span>
        </div>
      </section>

      <section class="controls">
        <div>
          <div class="section-heading">
            <h2>模板库</h2>
            <span id="templateCount"></span>
          </div>
          <div id="workspaceTabs" class="workspace-tabs" aria-label="工作区">
            <button type="button" data-workspace="cameras" aria-pressed="true">科学镜头</button>
            <button type="button" data-workspace="cards" aria-pressed="false">科学透卡</button>
            <button type="button" data-workspace="figures" aria-pressed="false">论文 Figure</button>
          </div>
          <div id="categoryTabs" class="category-tabs" aria-label="模板分类"></div>
          <div id="lensList" class="lens-list"></div>
        </div>

        <article id="templateInfo" class="template-info"></article>

        <div class="text-editor">
          <h2>文字</h2>
          <label>
            主标题
            <input id="titleInput" type="text" maxlength="32" />
          </label>
          <label>
            副标题 / 样本名
            <input id="subtitleInput" type="text" maxlength="48" />
          </label>
          <label>
            日期 / 卷期
            <input id="metaInput" type="text" maxlength="48" />
          </label>
          <label>
            刊名字标模式
            <select id="journalLogoModeSelect">
              <option value="safe" selected>原创替代</option>
              <option value="creative">创意展示</option>
            </select>
          </label>
        </div>

        <div class="control-grid">
          <label>
            图片缩放
            <input id="zoomRange" type="range" min="0.5" max="3" value="1" step="0.01" />
          </label>
          <label>
            X 位移
            <input id="offsetXRange" type="range" min="-500" max="500" value="0" step="1" />
          </label>
          <label>
            Y 位移
            <input id="offsetYRange" type="range" min="-500" max="500" value="0" step="1" />
          </label>
          <label>
            旋转
            <input id="rotationRange" type="range" min="-180" max="180" value="0" step="1" />
          </label>
          <label>
            效果强度
            <input id="intensityRange" type="range" min="0" max="1.5" value="1" step="0.01" />
          </label>
          <label>
            非均匀程度
            <input id="spatialVariationRange" type="range" min="0" max="1" value="0.55" step="0.01" />
          </label>
          <label>
            透卡缩放
            <input id="cardScaleRange" type="range" min="0.7" max="1.25" value="1" step="0.01" />
          </label>
          <label>
            透卡旋转
            <input id="cardRotateRange" type="range" min="-14" max="14" value="0" step="0.1" />
          </label>
          <label>
            玻璃反光
            <input id="reflectionRange" type="range" min="0" max="1" value="0.5" step="0.01" />
          </label>
        </div>

        <div class="actions">
          <button id="resetButton" type="button">重置图片</button>
          <button id="downloadButton" type="button">下载预览图</button>
          <button id="saveRecipeButton" type="button">保存配方</button>
          <button id="loadRecipeButton" type="button">应用配方</button>
        </div>

        <div class="export-settings">
          <h2>导出</h2>
          <label>
            质量档位
            <select id="qualitySelect">
              <option value="smooth">流畅 2048px</option>
              <option value="standard" selected>标准 3072px</option>
              <option value="high">高清 4096px</option>
            </select>
          </label>
          <label>
            调试视图
            <select id="debugViewSelect">
              <option value="final" selected>最终合成</option>
              <option value="parameter">Parameter Map</option>
              <option value="luminance">Luminance</option>
              <option value="edge">Edge</option>
              <option value="texture">Texture</option>
              <option value="saliency">Saliency</option>
              <option value="channelA">Channel A</option>
              <option value="channelB">Channel B</option>
              <option value="stain">Stain</option>
              <option value="material">Material</option>
            </select>
          </label>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
